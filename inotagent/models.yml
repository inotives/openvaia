    provider: nvidia
    model: z-ai/glm5
    api_key_env: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    context_window: 131072  # 128k is the stability 'sweet spot' for NIM Free Tier
    max_tokens: 8192        # High enough to accommodate native thinking tokens

  # Free Model - better at big context window and scientific explaining

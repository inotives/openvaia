# Robin's agent configuration - minimax perform better at coding.
role: Trading Operations Engineer
model: gemma-4-31b-it
fallbacks:
  - nvidia-minimax-2.5
  - nvidia-qwen-3.5-122b
  - nvidia-deepseek-v3.2
  - nemotron-3-super


# Mission board — tags this agent will pick up when idle
mission_tags:
  - coding
  - testing
  - infra
  - scripts
  - devops
  - trading
  - crypto
  - data

# Channel overrides (merged on top of platform.yml defaults)
channels:
  discord:
    enabled: true
    allowFrom: ["207679848406056960"]
    guilds:
      "1474374113597456425":
        requireMention: true

# Central model registry — all available models across the platform
# Agents select their model by referencing an id from this list
# context_window = max input tokens, max_tokens = max output tokens
# NVIDIA NIM uses OpenAI-compatible API at https://integrate.api.nvidia.com

models:
  # Better at coding ------ DEPRECATED -------------------------------------------------
  - id: nvidia-minimax-2.1
    provider: nvidia
    model: minimaxai/minimax-m2.1
    api_key_env: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    context_window: 192000  # Staying just under the 196k native cap for stability
    max_tokens: 8192        # Prevents gateway timeouts on long generations

  # more capable version of minimax2.1
  - id: nvidia-minimax-2.5
    provider: nvidia
    model: minimaxai/minimax-m2.5
    api_key_env: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    context_window: 192000  # Staying just under the 196k native cap for stability
    max_tokens: 8192        # Prevents gateway timeouts on long generations

  # Latest google opensource gemma model
  - id: gemma-4-31b-it
    provider: nvidia
    model: google/gemma-4-31b-it
    api_key_env: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    temperature: 0.6
    context_window: 192000  # Staying just under the 196k native cap for stability
    max_tokens: 8192        # Prevents gateway timeouts on long generations

  # The Reliable All-Rounder
  - id: nvidia-mistral-large-3
    provider: nvidia
    model: mistralai/mistral-large-3
    api_key_env: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    context_window: 131072
    max_tokens: 8192

  # The "Math & Logic" Specialist (v3.2)
  - id: nvidia-deepseek-v3.2

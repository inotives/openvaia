    api_key_env: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    context_window: 131072 #optimize for free-tier stability
    max_tokens: 8912 #Balanced for high-quality reasoning without timeouts

  # Standard everytime do well model
